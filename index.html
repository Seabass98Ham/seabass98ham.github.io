<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Open Card Sorting Tool</title>
<style>
body { font-family: Avenir, sans-serif; margin: 100px; }
h1 { margin-bottom: 10px; }
.board { display: flex; gap: 20px; flex-wrap: wrap; }
.category {
  background: #f4f4f4;
  padding: 10px;
  width: 220px;
  height: 220px;
  border-radius: 8px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.category-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 0 0 10px 0;
}
.category h3 { margin: 0; cursor: text; flex: 1; font-size: 16px;}
.delete-btn {
  background: none;
  border: none;
  color: #aaa;
  font-size: 16px;
  cursor: pointer;
  padding: 0 5px 0 6px;
  margin: 0;
  line-height: 1;
  flex-shrink: 0;
}
.delete-btn:hover { color: #e53935; background: none; }
.card { background: white; padding: 8px; margin-bottom: 8px; border-radius: 5px; cursor: grab; border: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; font-size: 14px;}
.card:active { cursor: grabbing; }
.card-label { flex: 1; }
.card .delete-btn { font-size: 12px; padding: 0 0 0 6px; }
button {
  background-color: #007BFF;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  margin-bottom: 20px;
  margin-right: 10px;
}
button:hover { background-color: #0069d8; }
#submit-btn {
  background-color: #28a745;
  margin-top: 20px;
}
#submit-btn:hover {
  background-color: #208537;
}
</style>
</head>
<body>

<h1>Activité de tri de cartes</h1>
<button id="add-card-btn">Ajoutez une carte</button>
<button id="add-category-btn">Ajoutez une catégorie</button>
<div class="board" id="board"></div>

<script>
let draggedCard = null;

const categories = ["Cartes à trier", "S'impliquer", "À propos","Actualités","Organismes partenaires", "Contact", "Fonctionnement"];
const initialCards = [
    "Calendrier des récoltes", 
    "Participer à une cueillette", 
    "Calendrier des cueillettes", 
    "Instructions pour les bénévoles", 
    "Fonctionnement d'une cueillette", 
    "Inscrire mon arbre", 
    "Conditions de participation",
    "FAQ",
    "Mission",
    "Notre impact",
    "Répartition des fruits",
    "Valeurs du collectif",
    "Inscription à l'infolettre",
    "Évènements",
    "Réseaux sociaux",
    "Contact",
    "Courriel",
    "Notre équipe",
    "Devenir chef de cueillette",
    "Guide d'entretien des arbres",
    "Guide de récolte des fruits",
    "Faire un don",
];

const categoryMap = {};

document.addEventListener("DOMContentLoaded", () => {
  const board = document.getElementById("board");

  categories.forEach(name => addCategory(name, false));

  initialCards.forEach(text => {
    const card = createCard(text);
    categoryMap["Cartes à trier"].appendChild(card);
  });

  document.getElementById("add-category-btn").addEventListener("click", () => {
    addCategory("Nouvelle catégorie", true);
  });

  document.getElementById("add-card-btn").addEventListener("click", () => {
    const cardName = prompt("Nom de la nouvelle carte :");
    if(cardName && cardName.trim() !== "") {
      const card = createCard(cardName.trim(), true);
      categoryMap["Cartes à trier"].appendChild(card);
    }
  });
});

function addCategory(name, isDeletable) {
  const board = document.getElementById("board");

  const category = document.createElement("div");
  category.className = "category";

  category.addEventListener("dragover", e => e.preventDefault());
  category.addEventListener("drop", () => {
    if (draggedCard) category.appendChild(draggedCard);
  });

  // Header wrapper
  const header = document.createElement("div");
  header.className = "category-header";

  const title = document.createElement("h3");
  title.textContent = name;
  title.contentEditable = true;
  header.appendChild(title);

  // Only add delete button for user-created categories
  if (isDeletable) {
    const deleteBtn = document.createElement("button");
    deleteBtn.className = "delete-btn";
    deleteBtn.textContent = "✕";
    deleteBtn.title = "Supprimer cette catégorie";
    deleteBtn.addEventListener("click", () => {
      // Move any cards back to "Cartes à trier" before removing
      const cards = category.querySelectorAll(".card");
      cards.forEach(card => categoryMap["Cartes à trier"].appendChild(card));
      delete categoryMap[title.textContent];
      category.remove();
    });
    header.appendChild(deleteBtn);
  }

  category.appendChild(header);
  board.appendChild(category);

  categoryMap[name] = category;
}

function createCard(text, isDeletable = false) {
  const card = document.createElement("div");
  card.className = "card";
  card.draggable = true;

  const label = document.createElement("span");
  label.className = "card-label";
  label.textContent = text;
  card.appendChild(label);

  if (isDeletable) {
    const deleteBtn = document.createElement("button");
    deleteBtn.className = "delete-btn";
    deleteBtn.textContent = "✕";
    deleteBtn.title = "Supprimer cette carte";
    deleteBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      card.remove();
    });
    card.appendChild(deleteBtn);
  }

  card.addEventListener("dragstart", () => {
    draggedCard = card;
    setTimeout(() => card.style.display = "none", 0);
  });

  card.addEventListener("dragend", () => {
    draggedCard = null;
    card.style.display = "flex";
  });

  return card;
}
  
</script>
<button id="submit-btn">Soumettre</button>
</body>
</html>
